# This configuration contains my attempt at creating an all-in-one locally hosted AI
# setup suitable for Linux. 
# - Includes InvokeAI, OpenWebUI (with Ollama), n8n, Stirling PDF, and Vert. 
# - Uses Tailscale for secure remote access.
# 
# ArtOfTheSmart.com | 2026-05-03

name: aots-ai-config

services:

# 1st service with Tailscale and GPU access for OpenWebUI
  ts-open-webui:
    container_name: ts-open-webui
    hostname: openwebui
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-open-webui:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/open-webui.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  open-webui:
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    network_mode: service:ts-open-webui
    depends_on:
      - ts-open-webui
    environment:
      WEBUI_AUTH: "false"
      OLLAMA_BASE_URL: "http://ollama.bombay-climb.ts.net"
      port: 1000
    volumes:
      - ./open-webui:/app/backend/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]


# 2nd service with Tailscale and GPU access for InvokeAI
  ts-invokeai:
    container_name: ts-invokeai
    hostname: invokeai
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-invokeai:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/invokeai.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  invokeai:
    container_name: invokeai
    image: ghcr.io/invoke-ai/invokeai:latest
    restart: unless-stopped
    network_mode: service:tailscale-invokeai
    depends_on:
      - tailscale-invokeai
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./invokeai:/invokeai

# 3rd service with Tailscale and Postgres for n8n
  ts-n8n:
    container_name: ts-n8n
    hostname: n8n
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-n8n:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/n8n.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  postgres:
    image: postgres:16
    restart: always
    network_mode: service:tailscale-n8n
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_NON_ROOT_USER=${POSTGRES_NON_ROOT_USER}
      - POSTGRES_NON_ROOT_PASSWORD=${POSTGRES_NON_ROOT_PASSWORD}
      - PGPORT=5432
    volumes:
      - db_storage:/var/lib/postgresql/data
      - ./init-data.sh:/docker-entrypoint-initdb.d/init-data.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
  n8n:
    container_name: n8n
    image: docker.n8n.io/n8nio/n8n
    restart: unless-stopped
    network_mode: service:tailscale-n8n
    depends_on:
      tailscale-n8n:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=localhost
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_NON_ROOT_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_NON_ROOT_PASSWORD}
      - N8N_PORT=1002
    volumes:
      - n8n_storage:/home/node/.n8n

# 4th service with Tailscale and Ollama (for direct connections)
  ts-ollama:
    container_name: ts-ollama
    hostname: ollama
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-ollama:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/ollama.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    restart: unless-stopped
    network_mode: service:ts-ollama
    depends_on:
      - ts-ollama
    environment:
      WEBUI_AUTH: "false"
      port: 11434
    volumes:
      - /var/lib/ai-models/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

# 5th service with Tailscale for Stirling PDF
  ts-stirling-pdf:
    container_name: ts-stirling-pdf
    hostname: stirling-pdf
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-stirling-pdf:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/stirling-pdf.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  stirling-pdf:
    container_name: stirling-pdf
    image: stirlingtools/stirling-pdf:latest
    restart: unless-stopped
    network_mode: service:ts-stirling-pdf
    depends_on:
      - ts-stirling-pdf
    environment:
      - SERVER_PORT=8080

# 6th service with Tailscale for Vert
  ts-vert:
    container_name: ts-vert
    hostname: vert
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-vert:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/vert.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  vert:
    container_name: vert
    image: ghcr.io/vert-sh/vert:latest
    restart: unless-stopped
    network_mode: service:ts-vert
    depends_on:
      - ts-vert

# 7th service with Tailscale for Grav Control Plane
  ts-grav-control:
    container_name: ts-grav-control
    hostname: grav
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-grav-control:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/grav.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  grav-control:
    container_name: grav-control
    build:
      context: ./grav-control
    restart: unless-stopped
    network_mode: service:ts-grav-control
    depends_on:
      - ts-grav-control
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

# 8th service: llama.cpp Instance 1
  ts-llama-cpp-1:
    container_name: ts-llama-cpp-1
    hostname: llama-1
    image: tailscale/tailscale:latest
    profiles: ["manual"]
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-llama-cpp-1:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/llama-cpp-1.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  llama-cpp-1:
    container_name: llama-cpp-1
    image: ghcr.io/ggml-org/llama.cpp:server
    profiles: ["manual"]
    restart: unless-stopped
    network_mode: service:ts-llama-cpp-1
    depends_on:
      - ts-llama-cpp-1
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
    command: --hf-repo ${LLAMA_HF_REPO_1} --hf-file ${LLAMA_HF_FILE_1} -c 4096 --port 8080
    volumes:
      - /var/lib/ai-models/llama:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

# 9th service: llama.cpp Instance 2
  ts-llama-cpp-2:
    container_name: ts-llama-cpp-2
    hostname: llama-2
    image: tailscale/tailscale:latest
    profiles: ["manual"]
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-llama-cpp-2:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/llama-cpp-2.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  llama-cpp-2:
    container_name: llama-cpp-2
    image: ghcr.io/ggml-org/llama.cpp:server
    profiles: ["manual"]
    restart: unless-stopped
    network_mode: service:ts-llama-cpp-2
    depends_on:
      - ts-llama-cpp-2
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
    command: --hf-repo ${LLAMA_HF_REPO_2} --hf-file ${LLAMA_HF_FILE_2} -c 4096 --port 8080
    volumes:
      - /var/lib/ai-models/llama:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

# 10th service: llama.cpp Instance 3 (CPU/iGPU only)
  ts-llama-cpp-3:
    container_name: ts-llama-cpp-3
    hostname: llama-3
    image: tailscale/tailscale:latest
    profiles: ["manual"]
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-llama-cpp-3:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/llama-cpp-3.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  llama-cpp-3:
    container_name: llama-cpp-3
    image: ghcr.io/ggml-org/llama.cpp:server
    profiles: ["manual"]
    restart: unless-stopped
    network_mode: service:ts-llama-cpp-3
    depends_on:
      - ts-llama-cpp-3
    devices:
      - /dev/dri:/dev/dri
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
    command: --hf-repo ${LLAMA_HF_REPO_3} --hf-file ${LLAMA_HF_FILE_3} -c 4096 --port 8080
    volumes:
      - /var/lib/ai-models/llama:/models

volumes:
  ts-open-webui: 
    driver: local
  ts-invokeai:
    driver: local
  ts-n8n:
    driver: local
  ts-ollama:
    driver: local
  ts-stirling-pdf:
    driver: local
  ts-grav-control:
    driver: local
  ts-llama-cpp-1:
    driver: local
  ts-llama-cpp-2:
    driver: local
  ts-llama-cpp-3:
    driver: local
  ts-vert:
    driver: local
  db_storage:
    driver: local
  n8n_storage:
    driver: local
