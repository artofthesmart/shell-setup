    container_name: ${LLAMA_NAME_1}
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    profiles: ["manual"]
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
