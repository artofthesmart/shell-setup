# 4th service: Tailscale and Ollama (dGPU)
  ts-ollama-gpu:
    container_name: ts-ollama-gpu
    hostname: ollama-gpu
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-ollama-gpu:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/ollama-gpu.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  ollama-gpu:
    container_name: ollama-gpu
    image: ollama/ollama:latest
    profiles: ["manual"]
    restart: unless-stopped
    runtime: nvidia
    network_mode: service:ts-ollama-gpu
    depends_on:
      - ts-ollama-gpu
    environment:
      WEBUI_AUTH: "false"
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_PORT: 11434
      OLLAMA_NOPRUNE: 1
    volumes:
      - /var/lib/ai-models/ollama/gpu-root:/root/.ollama
      - /var/lib/ai-models/ollama/blobs:/root/.ollama/models/blobs
      - /var/lib/ai-models/llama:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

