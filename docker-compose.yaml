      timeout: 10s
      retries: 5
      start_period: 300s
    network_mode: service:ts-llama-cpp-1
    depends_on:
      - ts-llama-cpp-1
    cap_add:
      - IPC_LOCK
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/models/cache
      - LLAMA_CACHE=/models/cache
    command: --hf-repo ${LLAMA_HF_REPO_1} --hf-file ${LLAMA_HF_FILE_1} -c 64000 --port 8080 --mlock -ngl 99
    volumes:
      - /var/lib/ai-models/llama:/models
