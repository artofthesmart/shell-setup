# 7th service with Tailscale for Grav
  ts-grav:
    container_name: ts-grav
    hostname: grav
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-grav-control:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/grav.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  grav:
    container_name: grav
    # Custom build extending getgrav/grav:latest.
    # Overrides entrypoint to support RC/prerelease tags (downloaded from GitHub,
    # not getgrav.org which only serves stable/beta-channel builds).
    build:
      context: ./config/grav
      dockerfile: Dockerfile
    profiles: ["manual"]
    restart: "no"
    network_mode: service:ts-grav
    depends_on:
      - ts-grav
    environment:
      # Explicit RC version tag - GRAV_CHANNEL=beta still serves 1.7.x via getgrav.org.
      # Setting GRAV_VERSION bypasses channel logic and downloads directly by tag.
      # Check https://github.com/getgrav/grav/releases for newer RCs.
      - GRAV_VERSION=2.0.0-rc.7
      - GRAV_SCHEDULER=true
      # Public-facing URL injected into system.yaml so the admin2 SPA knows
      # the correct serverUrl when Apache sits behind the Tailscale sidecar.
      - GRAV_BASE_URL=https://grav.bombay-climb.ts.net
      # Shared group (grav-data, GID 1033) gives www-data write access to the
      # workspace without changing its UID — the container process stays as
      # UID 33, not the host user, for better containment on escape.
      - PGID=1033
    volumes:
      # Main Grav workspace (user content, config, plugins, etc.)
      - /home/user/grav_workspace:/var/www/html
      # Theme source directory mounted so symlinks inside the container can resolve it
      - /home/user/Github/hypertext:/home/user/Github/hypertext:ro

# Grav 1.7 version.
  ts-grav17:
    container_name: ts-grav17
    hostname: grav17
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-grav17-control:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/grav17.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  grav17:
    container_name: grav17
    # Custom build extending getgrav/grav:latest.
    # We use this instead of the off-the-shelf image directly so we get
    # the PGID remap and custom_base_url injection from docker-entrypoint.sh.
    build:
      context: ./config/grav
      dockerfile: Dockerfile
    profiles: ["manual"]
    restart: "no"
    network_mode: service:ts-grav17
    depends_on:
      - ts-grav17
    environment:
      - GRAV_SCHEDULER=true
      # Public-facing URL injected into system.yaml so the admin2 SPA knows
      # the correct serverUrl when Apache sits behind the Tailscale sidecar.
      - GRAV_BASE_URL=https://grav17.bombay-climb.ts.net
      # Shared group (grav-data, GID 1033) gives www-data write access to the
      # workspace without changing its UID — the container process stays as
      # UID 33, not the host user, for better containment on escape.
      - PGID=1033
    volumes:
      # Main Grav workspace (user content, config, plugins, etc.)
