              capabilities: [gpu]
    volumes:
      - ./invokeai:/invokeai

# 3rd service with Tailscale and Postgres for n8n
  ts-n8n:
    container_name: ts-n8n
    hostname: n8n
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
