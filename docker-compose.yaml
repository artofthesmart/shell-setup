# This configuration contains my attempt at creating an all-in-one locally hosted AI
# setup suitable for Linux. 
# - Includes InvokeAI, OpenWebUI (with Ollama), n8n, Stirling PDF, and Vert. 
# - Uses Tailscale for secure remote access.
# 
# ArtOfTheSmart.com | 2026-05-03

name: aots-ai-config

services:

# 1st service with Tailscale and GPU access for OpenWebUI
  ts-open-webui:
    container_name: ts-open-webui
    hostname: openwebui
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-open-webui:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/open-webui.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  open-webui:
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    network_mode: service:ts-open-webui
    depends_on:
      - ts-open-webui
    environment:
      WEBUI_AUTH: "false"
      OLLAMA_BASE_URLS: "https://ollama-gpu.bombay-climb.ts.net; https://ollama-cpu.bombay-climb.ts.net"
      PORT: 1000
    volumes:
      - ./open-webui:/app/backend/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]


# 2nd service with Tailscale and GPU access for InvokeAI
  ts-invokeai:
    container_name: ts-invokeai
    hostname: invokeai
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-invokeai:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/invokeai.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  invokeai:
    container_name: invokeai
    image: ghcr.io/invoke-ai/invokeai:latest
    restart: unless-stopped
    network_mode: service:ts-invokeai
    depends_on:
      - ts-invokeai
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./invokeai:/invokeai

# 3rd service with Tailscale and Postgres for n8n
  ts-n8n:
    container_name: ts-n8n
    hostname: n8n
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-n8n:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/n8n.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  n8n:
    container_name: n8n
    image: docker.n8n.io/n8nio/n8n
    restart: unless-stopped
    network_mode: service:ts-n8n
    depends_on:
      ts-n8n:
        condition: service_started
    environment:
      - N8N_PORT=1002
    volumes:
      - n8n_storage:/home/node/.n8n

# 4th service: Tailscale and Ollama (dGPU)
  ts-ollama-gpu:
    container_name: ts-ollama-gpu
    hostname: ollama-gpu
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-ollama-gpu:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/ollama-gpu.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  ollama-gpu:
    container_name: ollama-gpu
    image: ollama/ollama:latest
    restart: unless-stopped
    network_mode: service:ts-ollama-gpu
    depends_on:
      - ts-ollama-gpu
    environment:
      WEBUI_AUTH: "false"
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_PORT: 11434
    volumes:
      - /var/lib/ai-models/ollama/gpu-root:/root/.ollama
      - /var/lib/ai-models/ollama/blobs:/root/.ollama/models/blobs
      - /var/lib/ai-models/llama:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

# 4.5 service: Tailscale and Ollama (CPU/iGPU)
  ts-ollama-cpu:
    container_name: ts-ollama-cpu
    hostname: ollama-cpu
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-ollama-cpu:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/ollama-cpu.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  ollama-cpu:
    container_name: ollama-cpu
    image: ollama/ollama:rocm
    restart: unless-stopped
    network_mode: service:ts-ollama-cpu
    depends_on:
      - ts-ollama-cpu
    cap_add:
      - IPC_LOCK
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    environment:
      WEBUI_AUTH: "false"
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_PORT: 11434
    volumes:
      - /var/lib/ai-models/ollama/cpu-root:/root/.ollama
      - /var/lib/ai-models/ollama/blobs:/root/.ollama/models/blobs
      - /var/lib/ai-models/llama:/models:ro
    deploy:
      resources:
        limits:
          memory: 80g
        reservations:
          memory: 80g

# 4.7 service: Unified Ollama Router (Tailscale + Proxy)
  ts-ollama-router:
    container_name: ts-ollama-router
    hostname: ollama
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-ollama-router:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/ollama-router.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  ollama-router:
    container_name: ollama-router
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    network_mode: service:ts-ollama-router
    depends_on:
      - ts-ollama-router
      - ollama-gpu
      - ollama-cpu
    volumes:
      - ./config/ollama-router.py:/app/router.py:ro
    command: python /app/router.py
    environment:
      - GPU_URL=https://ollama-gpu.bombay-climb.ts.net
      - CPU_URL=https://ollama-cpu.bombay-climb.ts.net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# 5th service with Tailscale for Stirling PDF
  ts-stirling-pdf:
    container_name: ts-stirling-pdf
    hostname: stirling-pdf
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-stirling-pdf:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/stirling-pdf.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  stirling-pdf:
    container_name: stirling-pdf
    image: stirlingtools/stirling-pdf:latest
    restart: unless-stopped
    network_mode: service:ts-stirling-pdf
    depends_on:
      - ts-stirling-pdf
    environment:
      - SERVER_PORT=8080

# 6th service with Tailscale for Vert
  ts-vert:
    container_name: ts-vert
    hostname: vert
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-vert:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/vert.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  vert:
    container_name: vert
    image: ghcr.io/vert-sh/vert:latest
    restart: unless-stopped
    network_mode: service:ts-vert
    depends_on:
      - ts-vert

# 7th service with Tailscale for Grav Control Plane
  ts-grav-control:
    container_name: ts-grav-control
    hostname: grav
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-grav-control:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/grav.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  grav-control:
    container_name: grav-control
    build:
      context: ./grav-control
    restart: unless-stopped
    network_mode: service:ts-grav-control
    depends_on:
      - ts-grav-control

# 8th service: llama.cpp Instance 1
  ts-llama-cpp-1:
    container_name: ts-${LLAMA_NAME_1}
    hostname: ${LLAMA_NAME_1}
    image: tailscale/tailscale:latest
    restart: "no"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-llama-cpp-1:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/llama-cpp-1.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  llama-cpp-1:
    container_name: ${LLAMA_NAME_1}
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    profiles: ["manual"]
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    network_mode: service:ts-llama-cpp-1
    depends_on:
      - ts-llama-cpp-1
    cap_add:
      - IPC_LOCK
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/models/cache
      - LLAMA_CACHE=/models/cache
    command: -m /models/${LLAMA_HF_FILE_1} --hf-repo ${LLAMA_HF_REPO_1} --hf-file ${LLAMA_HF_FILE_1} -c 4096 --port 8080 --mlock -ngl 99
    volumes:
      - /var/lib/ai-models/llama:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

# 9th service: llama.cpp Instance 2
  ts-llama-cpp-2:
    container_name: ts-${LLAMA_NAME_2}
    hostname: ${LLAMA_NAME_2}
    image: tailscale/tailscale:latest
    restart: "no"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-llama-cpp-2:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/llama-cpp-2.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  llama-cpp-2:
    container_name: ${LLAMA_NAME_2}
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    profiles: ["manual"]
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    network_mode: service:ts-llama-cpp-2
    depends_on:
      - ts-llama-cpp-2
    cap_add:
      - IPC_LOCK
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/models/cache
      - LLAMA_CACHE=/models/cache
    command: -m /models/${LLAMA_HF_FILE_2} --hf-repo ${LLAMA_HF_REPO_2} --hf-file ${LLAMA_HF_FILE_2} -c 4096 --port 8080 --mlock -ngl 99
    volumes:
      - /var/lib/ai-models/llama:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

# 10th service: llama.cpp Instance 3 (CPU/iGPU only)
  ts-llama-cpp-3:
    container_name: ts-${LLAMA_NAME_3}
    hostname: ${LLAMA_NAME_3}
    image: tailscale/tailscale:latest
    restart: "no"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-llama-cpp-3:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/llama-cpp-3.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  llama-cpp-3:
    container_name: ${LLAMA_NAME_3}
    image: ghcr.io/ggml-org/llama.cpp:server
    profiles: ["manual"]
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    network_mode: service:ts-llama-cpp-3
    depends_on:
      - ts-llama-cpp-3
    devices:
      - /dev/dri:/dev/dri
    cap_add:
      - IPC_LOCK
    mem_limit: 86g
    memswap_limit: 86g
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/models/cache
      - LLAMA_CACHE=/models/cache
    command: -m /models/${LLAMA_HF_FILE_3} --hf-repo ${LLAMA_HF_REPO_3} --hf-file ${LLAMA_HF_FILE_3} -c 4096 --port 8080 --mlock
    volumes:
      - /var/lib/ai-models/llama:/models

# 11th service: Portainer for GUI management
  ts-portainer:
    container_name: ts-portainer
    hostname: portainer
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-portainer:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/portainer.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    network_mode: service:ts-portainer
    depends_on:
      - ts-portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  ts-open-webui: 
    driver: local
  ts-invokeai:
    driver: local
  ts-n8n:
    driver: local
  ts-ollama-gpu:
    driver: local
  ts-ollama-cpu:
    driver: local
  ts-stirling-pdf:
    driver: local
  ts-grav-control:
    driver: local
  ts-llama-cpp-1:
    driver: local
  ts-llama-cpp-2:
    driver: local
  ts-llama-cpp-3:
    driver: local
  ts-vert:
    driver: local
  ts-ollama-router:
    driver: local
  n8n_storage:
    driver: local
  ts-portainer:
    driver: local
  portainer_data:
    driver: local
