services:

# 1st service with Tailscale and GPU access for OpenWebUI
  ts-open-webui:
    container_name: ts-open-webui
    hostname: openwebui
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-open-webui:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/open-webui.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  open-webui:
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    network_mode: service:ts-open-webui
    depends_on:
      - ts-open-webui
    environment:
      WEBUI_AUTH: "false"
      OLLAMA_BASE_URLS: "https://ollama-cpu.bombay-climb.ts.net"
      OPENAI_API_BASE_URLS: "https://code-llm.bombay-climb.ts.net/v1;https://flash-llm.bombay-climb.ts.net/v1;https://large-llm.bombay-climb.ts.net/v1;https://mini-llm.bombay-climb.ts.net/v1"
      OPENAI_API_KEYS: "none;none;none;none"
      ENABLE_API_KEYS: "true"
      PORT: 1000
    volumes:
      - ./open-webui:/app/backend/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]


# 2nd service with Tailscale and GPU access for InvokeAI
  ts-invokeai:
    container_name: ts-invokeai
    hostname: invokeai
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
