      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/llama-cpp-5.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  llama-cpp-5:
    container_name: ${LLAMA_NAME_5}
    build:
      context: /home/user/Github/llama.cpp
      dockerfile: Dockerfile.local
    profiles: ["manual"]
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    network_mode: service:ts-llama-cpp-5
    depends_on:
      - ts-llama-cpp-5
    devices:
      - /dev/dri:/dev/dri
    cap_add:
      - IPC_LOCK
    mem_limit: 86g
    memswap_limit: 86g
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
      - HF_TOKEN=${HF_TOKEN}
      - HF_HOME=/models/cache
      - LLAMA_CACHE=/models/cache
    command: --hf-repo ${LLAMA_HF_REPO_5} --hf-file ${LLAMA_HF_FILE_5} -c 262144 --port 8080 -t 16 --temp 1.0 --top-p 0.95 --min-p 0.01 --top-k 40
    volumes:
      - /var/lib/ai-models/llama:/models

# 12th service: Portainer for GUI management
  ts-portainer:
    container_name: ts-portainer
    hostname: portainer
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-portainer:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/portainer.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    network_mode: service:ts-portainer
    depends_on:
      - ts-portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

# 12th service: GPT Researcher
  ts-gpt-researcher:
    container_name: ts-gpt-researcher
    hostname: gpt-researcher
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-gpt-researcher:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/gpt-researcher.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  gpt-researcher:
    container_name: gpt-researcher
    image: gptresearcher/gpt-researcher:latest
    profiles: ["manual"]
    restart: "no"
    network_mode: service:ts-gpt-researcher
    depends_on:
      - ts-gpt-researcher
    environment: 
      OPENAI_API_KEY: "ollama"
      OPENAI_API_BASE: "https://ollama-gpu.bombay-climb.ts.net/v1"
      OLLAMA_BASE_URL: "https://ollama-gpu.bombay-climb.ts.net"
      LLM_PROVIDER: "ollama"
      # Feel free to change FAST_LLM and SMART_LLM in your .env file
      FAST_LLM: ${FAST_LLM}
      SMART_LLM: ${SMART_LLM}
      EMBEDDING_PROVIDER: "ollama"
      OLLAMA_EMBEDDING_MODEL: "nomic-embed-text"
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LOGGING_LEVEL: INFO
      # Image generation (optional - set to enable inline images in reports)
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      IMAGE_GENERATION_ENABLED: ${IMAGE_GENERATION_ENABLED:-false}
      IMAGE_GENERATION_MODEL: ${IMAGE_GENERATION_MODEL:-gemini-2.0-flash-preview-image-generation}
      IMAGE_GENERATION_MAX_IMAGES: ${IMAGE_GENERATION_MAX_IMAGES:-3}
    volumes:
      - ./my-docs:/usr/src/app/my-docs:rw
      - ./outputs:/usr/src/app/outputs:rw
      - ./logs:/usr/src/app/logs:rw

# 13th service: Kokoro Web
  ts-kokoro:
    container_name: ts-kokoro
    hostname: kokoro
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-kokoro:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/kokoro.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  kokoro-web:
    container_name: kokoro-web
    image: ghcr.io/eduardolat/kokoro-web:latest
    profiles: ["manual"]
    restart: "no"
    network_mode: service:ts-kokoro
    depends_on:
      - ts-kokoro
    #environment:
      # Change this to any secret key to use as your OpenAI compatible API key
      # - KW_SECRET_API_KEY=${KW_SECRET_API_KEY:-your-api-key}
    volumes:
      - ./kokoro-cache:/kokoro/cache

# 14th service: Metatonic OpenedAI Speech
  ts-metatonic:
    container_name: ts-metatonic
    hostname: metatonic
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-metatonic:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/metatonic.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  metatonic:
    container_name: metatonic
    image: ghcr.io/matatonic/openedai-speech:latest
    profiles: ["manual"]
    restart: "no"
    network_mode: service:ts-metatonic
    depends_on:
      - ts-metatonic
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

# 15th service: LiteLLM Gateway
  ts-litellm:
    container_name: ts-litellm
    hostname: litellm
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-litellm:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/litellm.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"
  litellm:
    container_name: litellm
    image: ghcr.io/berriai/litellm:latest
    restart: unless-stopped
    network_mode: service:ts-litellm
    depends_on:
      - ts-litellm
    volumes:
      - ./config/litellm-config.yaml:/app/config.yaml:ro
    command: --config /app/config.yaml --port 4000

# 16th service: Dify Environment with Tailscale
  ts-dify:
    container_name: ts-dify
    hostname: dify
    image: tailscale/tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ts-dify:/var/lib/tailscale
      - ./config:/config
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/dify.json
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --netfilter-mode=off"

  dify-nginx:
    container_name: dify-nginx
    image: nginx:alpine
    restart: unless-stopped
    network_mode: service:ts-dify
    depends_on:
      - ts-dify
    volumes:
      - ./config/dify-nginx.conf:/etc/nginx/conf.d/default.conf:ro

  dify-db:
    container_name: dify-db
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: difyai123456
      POSTGRES_DB: dify
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - dify_db_data:/var/lib/postgresql/data
      - ./config/dify-db-init.sh:/docker-entrypoint-initdb.d/create-plugin-db.sh:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "dify"]
      interval: 5s
      timeout: 5s
      retries: 5

  dify-redis:
    container_name: dify-redis
    image: redis:6-alpine
    restart: always
    command: redis-server --requirepass difyai123456
    volumes:
      - dify_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a difyai123456 ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 5

  dify-weaviate:
    container_name: dify-weaviate
    image: semitechnologies/weaviate:1.27.0
    restart: always
    environment:
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: WVF5YThaHlkYwhGUSmCRgsX3tD5ngdN8pkih
      AUTHENTICATION_APIKEY_USERS: hello@dify.ai
      AUTHORIZATION_ADMINLIST_ENABLED: "true"
      AUTHORIZATION_ADMINLIST_USERS: hello@dify.ai
      DISABLE_TELEMETRY: "false"
    volumes:
      - dify_weaviate_data:/var/lib/weaviate

  dify-sandbox:
    container_name: dify-sandbox
    image: langgenius/dify-sandbox:0.2.15
    restart: always
    environment:
      API_KEY: dify-sandbox
      GIN_MODE: release
      WORKER_TIMEOUT: 15
      ENABLE_NETWORK: "true"
      SANDBOX_PORT: 8194
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8194/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  dify-ssrf-proxy:
    container_name: dify-ssrf-proxy
    image: ubuntu/squid:latest
    restart: always
    volumes:
      - ./config/dify-squid.conf:/etc/squid/squid.conf:ro

  dify-init-permissions:
    container_name: dify-init-permissions
    image: busybox:latest
    command:
      - sh
      - -c
      - |
        FLAG_FILE="/app/api/storage/.init_permissions"
        if [ -f "$${FLAG_FILE}" ]; then
          echo "Permissions already initialized. Exiting."
          exit 0
        fi
        echo "Initializing permissions for /app/api/storage"
        chown -R 1001:1001 /app/api/storage && touch "$${FLAG_FILE}"
        echo "Permissions initialized. Exiting."
    volumes:
      - dify_api_storage:/app/api/storage
    restart: "no"

  dify-api:
    container_name: dify-api
    image: langgenius/dify-api:1.14.2
    restart: always
    environment:
      <<: *dify-env
      MODE: api
    volumes:
      - dify_api_storage:/app/api/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      dify-init-permissions:
        condition: service_completed_successfully
      dify-db:
        condition: service_healthy
      dify-redis:
        condition: service_started

  dify-worker:
    container_name: dify-worker
    image: langgenius/dify-api:1.14.2
    restart: always
    environment:
      <<: *dify-env
      MODE: worker
    volumes:
      - dify_api_storage:/app/api/storage
    depends_on:
      dify-init-permissions:
        condition: service_completed_successfully
      dify-db:
        condition: service_healthy
      dify-redis:
        condition: service_started

  dify-worker-beat:
    container_name: dify-worker-beat
    image: langgenius/dify-api:1.14.2
    restart: always
    environment:
      <<: *dify-env
      MODE: beat
    depends_on:
      dify-db:
        condition: service_healthy
      dify-redis:
        condition: service_started

  dify-web:
    container_name: dify-web
    image: langgenius/dify-web:1.14.2
    restart: always
    environment:
      CONSOLE_API_URL: ""
      SERVER_CONSOLE_API_URL: http://dify-api:5001
      APP_API_URL: ""
      NEXT_PUBLIC_SOCKET_URL: ws://dify
      NEXT_TELEMETRY_DISABLED: "0"

  dify-plugin-daemon:
    container_name: dify-plugin-daemon
    image: langgenius/dify-plugin-daemon:0.6.1-local
    restart: always
    environment:
      DB_USERNAME: postgres
      DB_PASSWORD: difyai123456
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: dify_plugin
      DB_SSL_MODE: disable
      SERVER_PORT: 5002
      SERVER_KEY: lYkiYYT6owG+71oLerGzA7GXCgOT++6ovaezWAjpCjf+Sjc3ZtU+qUEi
      MAX_PLUGIN_PACKAGE_SIZE: 52428800
      PPROF_ENABLED: "false"
      DIFY_INNER_API_URL: http://dify-api:5001
      DIFY_INNER_API_KEY: QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1
      PLUGIN_REMOTE_INSTALLING_HOST: 0.0.0.0
      PLUGIN_REMOTE_INSTALLING_PORT: 5003
      PLUGIN_WORKING_PATH: /app/storage/cwd
      FORCE_VERIFYING_SIGNATURE: "true"
      PYTHON_ENV_INIT_TIMEOUT: 120
      PLUGIN_MAX_EXECUTION_TIMEOUT: 600
      PLUGIN_STORAGE_TYPE: local
      PLUGIN_STORAGE_LOCAL_ROOT: /app/storage
      PLUGIN_INSTALLED_PATH: plugin
      PLUGIN_PACKAGE_CACHE_PATH: plugin_packages
      PLUGIN_MEDIA_CACHE_PATH: assets
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: difyai123456
    volumes:
      - dify_plugin_storage:/app/storage
    depends_on:
      dify-db:
        condition: service_healthy
      dify-redis:
        condition: service_started

